name: ie-unud-kaizen

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: kaizen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      # Binds only to the host machine for local access, blocking external network access
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kaizen-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: kaizen-adminer
    restart: unless-stopped
    ports:
      - "5050:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - kaizen-network

